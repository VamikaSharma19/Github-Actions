name: using_action
on: pull_request
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    # Clone repository
      - name: Checkout code  
        uses: actions/checkout@v4
      # - name: list files
      #   run: ls
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Check Node version
        run: node -v
      - name: Check NPM version
        run: npm -v
      - name: Install dependencies
        run: npm i
      - name: Run test
        run: npm run test
  deploy-app:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: deploy app
        run: echo "deploy"